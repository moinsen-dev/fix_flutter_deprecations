name: fix_flutter_deprecations
description: A powerful and extensible Dart CLI tool that automatically fixes Flutter deprecations in your codebase
version: 0.2.0
homepage: https://github.com/moinsen-dev/fix_flutter_deprecations
repository: https://github.com/moinsen-dev/fix_flutter_deprecations
issue_tracker: https://github.com/moinsen-dev/fix_flutter_deprecations/issues
documentation: https://github.com/moinsen-dev/fix_flutter_deprecations#readme

environment:
  sdk: ^3.8.0

platforms:
  linux:
  macos:
  windows:

dependencies:
  args: ^2.7.0
  cli_completion: ^0.5.1
  equatable: ^2.0.8
  mason_logger: ^0.3.5
  meta: ^1.18.2
  path: ^1.9.1
  pub_updater: ^0.5.0

dev_dependencies:
  build_runner: ^2.15.0
  build_verify: ^3.1.1
  build_version: ^2.1.3
  mocktail: ^1.0.5
  test: ^1.31.1
  very_good_analysis: ^10.2.0

executables:
  fix_deprecations:
