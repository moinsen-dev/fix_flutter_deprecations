name: Release

on:
  push:
    tags:
      - 'v*.*.*'  # Triggers on version tags like v0.1.2

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: 📚 Git Checkout
        uses: actions/checkout@v7

      - name: 🎯 Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: 'stable'

      - name: 📦 Install Dependencies
        run: dart pub get

      - name: 🧪 Run Tests
        run: dart test --coverage=coverage

      - name: 📊 Check Code Coverage
        uses: VeryGoodOpenSource/very_good_coverage@v3
        with:
          path: coverage/lcov.info
          min_coverage: 95

      - name: 🔍 Analyze Code
        run: dart analyze --fatal-infos

      - name: 🎨 Check Formatting
        run: dart format --set-exit-if-changed .

      - name: 🔎 Verify Version
        run: dart run test --run-skipped -t version-verify

  create-release:
    name: Create GitHub Release
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 📚 Git Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: 🏷️ Get Version from Tag
        id: get_version
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          VERSION=${TAG_NAME#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: 📝 Extract Changelog
        id: changelog
        run: |
          # Extract changelog for this version
          VERSION="${{ steps.get_version.outputs.version }}"
          
          # Use awk to extract the changelog section for this version
          CHANGELOG_CONTENT=$(awk -v version="[$VERSION]" '
            $0 ~ "## " version {found=1; next}
            found && /^## \[/ {exit}
            found {print}
          ' CHANGELOG.md | sed '/^$/d' | head -50)
          
          # If no specific changelog found, use a default message
          if [ -z "$CHANGELOG_CONTENT" ]; then
            CHANGELOG_CONTENT="Release version $VERSION

          See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details."
          fi
          
          # Save changelog to output
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG_CONTENT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 🚀 Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.get_version.outputs.tag_name }}
          release_name: Release ${{ steps.get_version.outputs.tag_name }}
          body: |
            ## What's Changed
            
            ${{ steps.changelog.outputs.changelog }}
            
            **Full Changelog**: https://github.com/${{ github.repository }}/compare/v${{ steps.get_version.outputs.version }}...HEAD
            
            ## Installation
            
            ```bash
            dart pub global activate fix_flutter_deprecations
            ```
            
            ## Usage
            
            ```bash
            fix_deprecations [path] [options]
            ```
            
            ---
            
            🤖 Generated with [Claude Code](https://claude.ai/code)
            
            Co-Authored-By: Claude <noreply@anthropic.com>
          draft: false
          prerelease: false

  publish-pub:
    name: Publish to pub.dev
    needs: [build-and-test, create-release]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: 📚 Git Checkout
        uses: actions/checkout@v7

      - name: 🎯 Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: 'stable'

      - name: 📦 Install Dependencies
        run: dart pub get

      - name: 🏗️ Build Package
        run: dart run build_runner build

      - name: 🔍 Verify Package
        run: dart pub publish --dry-run

      - name: 🚀 Publish to pub.dev
        run: dart pub publish --force